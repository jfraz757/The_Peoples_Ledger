<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The People's Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─────────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100%;
      background-color: #1a1a1a;
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 50px;
      z-index: 100;
      background-color: rgba(30, 30, 30, 0.92);
      border-bottom: 1px solid rgba(255, 215, 0, 0.2);
    }

    .site-title {
      font-family: 'Michroma', sans-serif;
      font-weight: 400;
      color: #FFD700;
      font-size: clamp(18px, 2.8vw, 38px);
      letter-spacing: 3px;
      -webkit-text-stroke: 1px #FFD700;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
      white-space: nowrap;
    }

    .hamburger-menu {
      display: none;
      background: transparent;
      border: none;
      color: #FFD700;
      cursor: pointer;
      margin-left: auto;
      padding: 4px;
    }

    .header-nav {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-link,
    button.nav-link {
      font-family: 'Michroma', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: #FFD700;
      text-decoration: none;
      padding: 6px 14px;
      border: 1px solid rgba(255,215,0,0.75);
      border-radius: 20px;
      transition: all 0.2s;
      background: transparent;
      cursor: pointer;
      display: inline-block;
      line-height: normal;
      -webkit-appearance: none;
    }

    .nav-link:hover, .nav-link.active,
    button.nav-link:hover {
      color: #1a1a1a;
      background-color: #FFD700;
      border-color: #FFD700;
    }

    .hero-tagline {
      font-family: 'Michroma', sans-serif;
      font-size: clamp(0.7rem, 1.5vw, 0.95rem);
      color: rgba(255,215,0,0.6);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px !important;
    }

    /* ─── Hero Banner ─────────────────────────────────────────── */
    .hero-banner {
      background-color: #111111;
      border-bottom: 3px solid #FFD700;
      padding: 52px 40px 44px;
      text-align: center;
    }

    .hero-banner h1 {
      font-family: 'Michroma', sans-serif;
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      color: #FFD700;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .hero-banner p {
      font-size: 1rem;
      color: rgba(255,255,255,0.70);
      max-width: 620px;
      margin: 0 auto;
      line-height: 1.75;
    }

    .record-count {
      display: inline-block;
      margin-top: 18px;
      font-size: 0.8rem;
      letter-spacing: 2px;
      color: #FFD700;
      text-transform: uppercase;
    }

    /* ─── Search Bar ──────────────────────────────────────────── */
    .search-section {
      background-color: #1a1a1a;
      padding: 36px 40px 28px;
      border-bottom: 1px solid rgba(255,215,0,0.15);
    }

    .search-row {
      display: flex;
      gap: 14px;
      max-width: 900px;
      margin: 0 auto;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .search-row .search-input-wrap {
      flex: 1 1 200px;
    }

    .search-input-wrap {
      position: relative;
      flex: 1 1 260px;
    }

    .search-input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,215,0,0.5);
      pointer-events: none;
    }

    .search-row input,
    .search-row select {
      width: 100%;
      background-color: rgba(60,60,60,0.75);
      border: none;
      border-bottom: 2px solid #FFD700;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.9rem;
      padding: 12px 14px 12px 42px;
      outline: none;
    }

    .search-row select {
      padding-left: 14px;
      cursor: pointer;
    }

    .search-row input::placeholder { color: rgba(255,255,255,0.45); }
    .search-row option { background-color: #2a2a2a; }

    .btn-search {
      background-color: transparent;
      border: 2px solid #FFD700;
      color: #FFD700;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 25px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background-color 0.3s, color 0.3s;
      white-space: nowrap;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .btn-search:hover {
      background-color: #FFD700;
      color: #1a1a1a;
    }

    /* ─── Filter Label ───────────────────────────────────── */
    .filter-label {
      max-width: 900px;
      margin: 0 auto;
      margin-top: 20px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,215,0,0.45);
      margin-bottom: 8px;
    }

    /* ─── Filter Pills ────────────────────────────────────────── */
    .filter-row {
      max-width: 900px;
      margin: 16px auto 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      background: transparent;
      border: 1px solid rgba(255,215,0,0.35);
      color: rgba(255,215,0,0.7);
      font-size: 0.75rem;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    .pill:hover, .pill.active {
      background-color: #FFD700;
      color: #1a1a1a;
      border-color: #FFD700;
      font-weight: 700;
    }

    /* ─── Export Button ──────────────────────────────────── */
    .export-bar {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 16px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn-export {
      background: transparent;
      border: 1px solid rgba(255,215,0,0.4);
      color: rgba(255,215,0,0.7);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 7px 18px;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .btn-export:hover {
      background-color: #FFD700;
      color: #1a1a1a;
      border-color: #FFD700;
    }

    /* ─── Results Area ────────────────────────────────────────── */
    .results-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }

    .results-meta {
      font-size: 0.8rem;
      color: rgba(255,215,0,0.5);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    /* ─── Business Cards ──────────────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background-color: rgba(30,30,30,0.85);
      border: 1px solid rgba(255,215,0,0.15);
      border-left: 3px solid #FFD700;
      padding: 22px 22px 18px;
